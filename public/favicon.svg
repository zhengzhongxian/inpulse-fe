<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F66398" />
      <stop offset="100%" stop-color="#DA447D" />
    </linearGradient>
  </defs>
  <!-- Rounded square background using the exact system pink gradient -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#pinkGrad)" />
  
  <!-- Teardrop ink droplet shape in white -->
  <path d="M 256 70 C 256 70, 110 230, 110 330 C 110 410, 176 450, 256 450 C 336 450, 402 410, 402 330 C 402 230, 256 70, 256 70 Z" fill="#FFFFFF" />
  
  <!-- Heartbeat pulse slit carved out of the droplet (drawn using the background gradient to appear transparent) -->
  <path d="M 50 310 H 180 L 215 190 L 250 400 L 285 110 L 320 340 L 345 260 L 365 310 H 462" fill="none" stroke="url(#pinkGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
</svg>